<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The True Cost of Fast Fashion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
            secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
            muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
            accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
            card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
            popover: { DEFAULT: "hsl(var(--popover))", foreground: "hsl(var(--popover-foreground))" },
            destructive: { DEFAULT: "hsl(var(--destructive))", foreground: "hsl(var(--destructive-foreground))" },
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)",
          },
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer base {
      :root {
        /* Dark forest green theme */
        --background: 156 38% 8%;
        --foreground: 132 28% 92%;
        --card: 156 32% 11%;
        --card-foreground: 132 28% 92%;
        --popover: 156 34% 10%;
        --popover-foreground: 132 28% 92%;
        --primary: 146 52% 46%;
        --primary-foreground: 156 40% 97%;
        --secondary: 156 24% 17%;
        --secondary-foreground: 132 25% 92%;
        --muted: 156 22% 15%;
        --muted-foreground: 132 12% 58%;
        --accent: 156 28% 19%;
        --accent-foreground: 132 28% 92%;
        --destructive: 4 72% 48%;
        --destructive-foreground: 0 0% 98%;
        --border: 156 20% 22%;
        --input: 156 22% 18%;
        --ring: 146 50% 48%;
        --radius: 0.5rem;
      }
      .dark {
        --background: 156 38% 8%;
        --foreground: 132 28% 92%;
        --card: 156 32% 11%;
        --card-foreground: 132 28% 92%;
        --popover: 156 34% 10%;
        --popover-foreground: 132 28% 92%;
        --primary: 146 52% 46%;
        --primary-foreground: 156 40% 97%;
        --secondary: 156 24% 17%;
        --secondary-foreground: 132 25% 92%;
        --muted: 156 22% 15%;
        --muted-foreground: 132 12% 58%;
        --accent: 156 28% 19%;
        --accent-foreground: 132 28% 92%;
        --destructive: 4 72% 48%;
        --destructive-foreground: 0 0% 98%;
        --border: 156 20% 22%;
        --input: 156 22% 18%;
        --ring: 146 50% 48%;
        --radius: 0.5rem;
      }
    }
    @layer base {
      * { @apply border-border; }
      body { @apply bg-background text-foreground; color-scheme: dark; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="min-h-screen font-sans antialiased">

  <!-- Navigation -->
  <nav class="sticky top-0 z-50 border-b bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
    <div class="flex h-14 items-center justify-between px-6">
      <span class="text-sm font-semibold tracking-tight">Fast Fashion Impact</span>
      <div class="flex items-center gap-6">
        <a href="index.html" class="text-sm font-medium text-foreground transition-colors hover:text-foreground/80">Visualization</a>
        <a href="documentation.html" class="text-sm font-medium text-muted-foreground transition-colors hover:text-foreground/80">Documentation</a>
      </div>
    </div>
  </nav>

  <!-- Page header -->
  <header class="py-8 text-center">
    <h1 class="text-2xl font-bold tracking-tight sm:text-3xl">What Is the True Cost of Fast Fashion?</h1>
    <p class="mx-auto mt-2 max-w-2xl text-sm text-muted-foreground">Every garment carries hidden costs beyond its price tag. Explore the environmental damage, human toll, and financial reality behind the world's largest fast-fashion brands.</p>
    <p class="mt-4 text-xs font-medium tracking-wide text-muted-foreground">By Shannon Isenberg</p>
  </header>

  <!-- View tabs -->
  <div class="flex items-center justify-center gap-2 px-6 pb-4" id="view-tabs">
    <button data-view="environmental" class="view-tab active inline-flex items-center gap-2 rounded-md px-4 py-2 text-sm font-medium transition-colors">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v19m-7-7 7 7 7-7M5 12a7 7 0 0 1 14 0" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Environmental Cost
    </button>
    <button data-view="human" class="view-tab inline-flex items-center gap-2 rounded-md px-4 py-2 text-sm font-medium transition-colors">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm14 10v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Human Cost
    </button>
    <button data-view="financial" class="view-tab inline-flex items-center gap-2 rounded-md px-4 py-2 text-sm font-medium transition-colors">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Financial Cost
    </button>
  </div>

  <!-- Filters: Tailwind Plus–style “simple native” selects + matching inputs (see tailwindcss.com/plus → Forms → Select Menus) -->
  <div class="border-y bg-muted/40 px-6 py-5" id="controls">
    <div class="mx-auto flex max-w-5xl flex-wrap items-end justify-center gap-x-8 gap-y-5">
      <div class="w-full sm:w-56 sm:min-w-[14rem]">
        <label for="brand-filter" class="block text-sm font-medium leading-6 text-foreground">Brand</label>
        <div class="relative mt-2">
          <select id="brand-filter" class="ui-select block w-full rounded-md border-0 bg-background py-2 pl-3 pr-10 text-sm text-foreground shadow-sm ring-1 ring-inset ring-border focus:outline-none focus:ring-2 focus:ring-inset focus:ring-ring sm:text-sm sm:leading-6">
            <option value="ALL">All brands</option>
          </select>
          <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2" aria-hidden="true">
            <svg class="h-5 w-5 text-muted-foreground" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" /></svg>
          </span>
        </div>
      </div>
      <div class="w-full sm:w-56 sm:min-w-[14rem]">
        <label for="country-filter" class="block text-sm font-medium leading-6 text-foreground">Country</label>
        <div class="relative mt-2">
          <select id="country-filter" class="ui-select block w-full rounded-md border-0 bg-background py-2 pl-3 pr-10 text-sm text-foreground shadow-sm ring-1 ring-inset ring-border focus:outline-none focus:ring-2 focus:ring-inset focus:ring-ring sm:text-sm sm:leading-6">
            <option value="ALL">All countries</option>
          </select>
          <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2" aria-hidden="true">
            <svg class="h-5 w-5 text-muted-foreground" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" /></svg>
          </span>
        </div>
      </div>
      <div class="w-full sm:w-28 sm:min-w-[7rem]">
        <label for="year-min" class="block text-sm font-medium leading-6 text-foreground">Year min</label>
        <div class="relative mt-2">
          <input type="number" id="year-min" class="block w-full rounded-md border-0 bg-background py-2 pl-3 pr-3 text-sm text-foreground shadow-sm ring-1 ring-inset ring-border placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-inset focus:ring-ring sm:text-sm sm:leading-6" />
        </div>
      </div>
      <div class="w-full sm:w-28 sm:min-w-[7rem]">
        <label for="year-max" class="block text-sm font-medium leading-6 text-foreground">Year max</label>
        <div class="relative mt-2">
          <input type="number" id="year-max" class="block w-full rounded-md border-0 bg-background py-2 pl-3 pr-3 text-sm text-foreground shadow-sm ring-1 ring-inset ring-border placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-inset focus:ring-ring sm:text-sm sm:leading-6" />
        </div>
      </div>
    </div>
  </div>

  <!-- Chart description -->
  <div class="px-6 pt-5">
    <h2 id="chart-title" class="text-lg font-semibold tracking-tight"></h2>
    <p id="chart-desc" class="mt-1 max-w-3xl text-sm text-muted-foreground"></p>
  </div>

  <!-- Legend -->
  <div id="legend" class="flex flex-wrap gap-3 px-6 pt-3 text-xs"></div>

  <!-- Main viz area -->
  <div class="px-6 py-4">
    <div class="flex flex-col gap-6 lg:flex-row lg:items-start">
      <!-- Chart -->
      <div id="chart-panel" class="min-w-0 flex-1"></div>
      <!-- Side panel -->
      <div id="side-panel" class="w-full shrink-0 overflow-y-auto rounded-lg border bg-card p-4 shadow-sm lg:w-80" style="max-height:560px">
        <h3 class="mb-3 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Key Metrics</h3>
        <div id="summary-grid" class="mb-4 grid grid-cols-2 gap-2"></div>
        <div id="takeaway" class="rounded-md border border-border/50 bg-muted/50 p-3 text-sm text-muted-foreground"></div>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="pointer-events-none absolute z-[200] max-w-[280px] rounded-lg border bg-popover p-3 text-xs leading-relaxed text-popover-foreground opacity-0 shadow-lg transition-opacity duration-100"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
